name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  validate-version:
    name: Validate version and release notes
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag_name: ${{ steps.validate.outputs.tag_name }}
      release_name: ${{ steps.validate.outputs.release_name }}
      release_notes_path: ${{ steps.validate.outputs.release_notes_path }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate tag, versions, and release notes
        id: validate
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          import tomllib

          tag = os.environ["GITHUB_REF_NAME"]
          release_notes_path = f".github/release-notes/{tag}.md"

          with open("package.json", "r", encoding="utf-8") as fh:
              package_version = json.load(fh)["version"]
          with open("src-tauri/tauri.conf.json", "r", encoding="utf-8") as fh:
              tauri_version = json.load(fh)["version"]
          with open("src-tauri/Cargo.toml", "rb") as fh:
              cargo_version = tomllib.load(fh)["package"]["version"]

          expected_tag = f"v{tauri_version}"
          if package_version != tauri_version or cargo_version != tauri_version:
              raise SystemExit(
                  f"Version mismatch: package.json={package_version}, "
                  f"tauri.conf.json={tauri_version}, Cargo.toml={cargo_version}"
              )

          if tag != expected_tag:
              raise SystemExit(
                  f"Tag does not match version. Current tag: {tag}, expected: {expected_tag}"
              )

          if not os.path.exists(release_notes_path):
              raise SystemExit(
                  f"Missing release notes file: {release_notes_path}"
              )

          with open(release_notes_path, "r", encoding="utf-8") as fh:
              release_notes = fh.read().strip()

          if not release_notes:
              raise SystemExit(
                  f"Release notes file is empty: {release_notes_path}"
              )

          output_path = os.environ["GITHUB_OUTPUT"]
          with open(output_path, "a", encoding="utf-8") as output:
              output.write(f"tag_name={tag}\n")
              output.write(f"release_name=PeekaUsage {tag}\n")
              output.write(f"release_notes_path={release_notes_path}\n")
          PY

  prepare-release:
    name: Prepare GitHub Release
    runs-on: ubuntu-latest
    needs: validate-version
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.release.outputs.release_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create or update GitHub Release
        id: release
        uses: actions/github-script@v7
        env:
          TAG_NAME: ${{ needs.validate-version.outputs.tag_name }}
          RELEASE_NAME: ${{ needs.validate-version.outputs.release_name }}
          RELEASE_NOTES_PATH: ${{ needs.validate-version.outputs.release_notes_path }}
        with:
          script: |
            const fs = require("fs");
            const tag = process.env.TAG_NAME;
            const releaseName = process.env.RELEASE_NAME;
            const releaseNotes = fs.readFileSync(process.env.RELEASE_NOTES_PATH, "utf8").trim();
            const releaseBody = `${releaseNotes}\n\n---\n\n## Artifacts\n- Windows: NSIS installer\n- Linux x86_64: DEB / AppImage\n- macOS x86_64 / arm64: app / dmg\n\n## Notes\n- Current macOS artifacts are unsigned and not notarized`;

            try {
              const existing = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });

              await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: existing.data.id,
                tag_name: tag,
                name: releaseName,
                body: releaseBody,
                draft: false,
                prerelease: false,
              });

              core.setOutput("release_id", String(existing.data.id));
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }

              const created = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                name: releaseName,
                body: releaseBody,
                draft: false,
                prerelease: false,
              });

              core.setOutput("release_id", String(created.data.id));
            }

  publish-bundles:
    name: ${{ matrix.name }}
    needs:
      - validate-version
      - prepare-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Publish Windows bundle
            platform: windows-latest
            tauri_args: --bundles nsis
            install_linux_deps: false
            rust_targets: ""
          - name: Publish Linux x86_64 bundle
            platform: ubuntu-22.04
            tauri_args: --config src-tauri/tauri.linux.conf.json --verbose
            install_linux_deps: true
            rust_targets: ""
          - name: Publish macOS Apple Silicon bundle
            platform: macos-latest
            tauri_args: --target aarch64-apple-darwin --config src-tauri/tauri.macos.conf.json
            install_linux_deps: false
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
          - name: Publish macOS Intel bundle
            platform: macos-latest
            tauri_args: --target x86_64-apple-darwin --config src-tauri/tauri.macos.conf.json
            install_linux_deps: false
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Install Linux build dependencies
        if: matrix.install_linux_deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libfuse2 \
            libgtk-3-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and upload bundles
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.prepare-release.outputs.release_id }}
          tagName: ${{ needs.validate-version.outputs.tag_name }}
          args: ${{ matrix.tauri_args }}
          releaseAssetNamePattern: "[name]_[version]_[platform]_[arch][setup][ext]"

  verify-updater-manifest:
    name: Verify updater manifest
    runs-on: ubuntu-latest
    needs:
      - validate-version
      - publish-bundles
    steps:
      - name: Check latest.json
        shell: bash
        run: |
          set -euo pipefail
          url="https://github.com/StarChen4/PeekaUsage/releases/download/${{ needs.validate-version.outputs.tag_name }}/latest.json"
          status_code="$(curl -L -s -o /tmp/latest.json -w '%{http_code}' "$url")"
          if [ "$status_code" != "200" ]; then
            echo "latest.json check failed, status: $status_code"
            exit 1
          fi

          if ! grep -q '"version"' /tmp/latest.json; then
            echo "latest.json is missing the version field"
            cat /tmp/latest.json
            exit 1
          fi
